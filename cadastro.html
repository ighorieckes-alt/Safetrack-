<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>IntelPack - Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">Intel<span>Pack</span></div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="catalogo.html">Catálogo</a></li>
                <li><a href="configuracao.html">Configurar Sensor</a></li>
                <li><a href="ajuda.html">Ajuda</a></li>
            </ul>
        </nav>
        <button class="btn-cadastro" onclick="window.location.href='cadastro.html'">Cadastrar</button>
    </header>

    <main>
        <section class="conteudo-pagina">
            <div class="form-container">
                <h2 style="color: #00d2d3; margin-bottom: 10px;">Vincular Nova Bolsa</h2>
                <p style="margin-bottom: 25px; color: #a0a0a0; font-size: 0.9rem;">Crie sua conta para ativar o rastreamento em tempo real e a trava biométrica.</p>
            
<!-- Wesley: adiconei o form e o pre -->
                <div class="pre-cadastro">
                    <form>
                            <div class="dadoscadastro">

                                <label class="dadosletras">NOME COMPLETO</label>
                                <input class="centralizar" type="text" id="nome-user" placeholder="Ex: João Silva">
                                
                                <label class="dadosletras">E-MAIL</label>
                                <input class="centralizar" type="email" id="email-user" placeholder="seu@email.com">
                                
                                <label class="dadosletras">ID DO SENSOR (ETIQUETA)</label>
                                <input class="centralizar" type="text" id="id-sensor" placeholder="Ex: SB-IOT-9921">

                                <label class="dadosletras">SENHA DE ACESSO</label>
                                <input class="centralizar" type="password" id="senha-user" placeholder="••••••••">
                        </div>
                    
                </form>
<!-- mudança final -->

                <!-- Chamando a função realizarCadastro do seu script.js -->
                <button class="btn-acao" onclick="realizarCadastro()">Ativar Sistema IoT</button>
                
                <p style="margin-top: 15px; font-size: 0.7rem; color: #555;">Ao clicar, você aceita os termos de segurança e criptografia de dados.</p>
            </div>
        </section>
    </main>

    <div id="dog-container">
        <div class="balao">Vem para a nossa alcateia tecnológica! 🐶</div>
        <img src="https://cdn-icons-png.flaticon.com" id="dog-robo" width="80">
    </div>

    <script src="script.js"></script>
</body>
</html>
